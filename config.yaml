server:
  host: 0.0.0.0
  port: 10086

model:
  index: 0

# PinkFox 表情映射（exp_id 对应 frontend/src/components/Live2DModel.jsx 中 EXPRESSIONS 字典的 key）
# 真实参数名来自 PinkFox/PinkFox.cdi3.json
# ID 对应的实际效果（基于 .cdi3.json 权威名称 + .exp3.json 文件名映射）：
#   0: 猫猫眼(key9)  3: 吐舌(key2)  4: 黑脸(key3)  5: 眼泪(key4)
#   6: 脸红(key5)    7: nn眼(key6)  8: 生气瘪嘴(key7)  9: 死鱼眼(key8)
#   11: 钱钱(key12)  18: 嘟嘴(key11)  19: 爱心(key16)  17: 泪眼(key17)
#   12: 兽耳消失(key19)  13: 尾巴消失(key20)
expressions:
  happy: 6          # 脸红 — 开心、害羞
  sad: 5            # 眼泪 — 伤心、难过
  angry: 8          # 生气瘪嘴 — 生气、不满
  surprised: 0      # 猫猫眼 — 惊讶、好奇
  love: 19          # 爱心 — 喜欢、感动
  shy: 6            # 脸红 — 害羞（同 happy）
  pout: 18          # 嘟嘴 — 委屈、撒娇
  squint: 9         # 死鱼眼 — 得意、满足
  dead_fish: 9      # 死鱼眼 — 无语、无奈
  nn_eyes: 7        # nn眼 — 呆萌
  dark_face: 4      # 黑脸 — 尴尬
  money_eyes: 11    # 钱钱 — 贪财、期待
  teary: 17         # 泪眼 — 感动、委屈
  cat_eyes: 0       # 猫猫眼 — 惊讶
  tongue: 3         # 吐舌 — 调皮、俏皮
  angry2: 0         # 生气 — 同猫猫眼（key9）
  squint2: 14       # 咪咪眼 — 撒娇、卖萌
  money_eyes2: 11   # 钱钱眼 — 同money_eyes
  ears_off: 12      # 兽耳消失 — 特殊效果
  tail_off: 13      # 尾巴消失 — 特殊效果
  neutral: -1       # 清除表情

motions:
  kuku: ":0"
  shake: ":1"

effects:
  rain: 100100
  snow: 100110

# 触摸反应配置
# 每个区域可配置：text（文字气泡）、expression（表情）、motion（动作）
# text 支持多条随机选择（数组）
touch_reactions:
  head:
    text:
      - "别摸我头啦！"
      - "呜...头发会乱的..."
      - "才、才不是觉得很舒服呢..."
    expression: "pout"
    motion: "TapBody"
  face:
    text:
      - "别戳我脸！"
      - "呜呜..."
      - "你、你在干什么啦！"
    expression: "shy"
    motion: "TapBody"
  body:
    text:
      - "别碰那里！"
      - "呀！"
      - "变态！"
    expression: "angry"
    motion: "TapBody"
